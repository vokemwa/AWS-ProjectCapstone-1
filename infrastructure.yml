AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate Deployment for Capstone App

Resources:
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: CapstoneCluster

  MyTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      RequiresCompatibilities: 
        - FARGATE
      NetworkMode: awsvpc
      Cpu: 256
      Memory: 512
      ContainerDefinitions:
        - Name: webapp-container
          Image:  # Replace with your ECR image URI
          PortMappings:
            - ContainerPort: 80

  # TODO: Define AWS::ECS::Service to run the task